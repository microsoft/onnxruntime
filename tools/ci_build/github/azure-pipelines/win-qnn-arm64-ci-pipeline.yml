##### start trigger Don't edit it manually, Please do edit set-trigger-rules.py ####
### please do rerun set-trigger-rules.py ###
trigger:
  branches:
    include:
    - main
    - rel-*
  paths:
    exclude:
    - docs/**
    - README.md
    - CONTRIBUTING.md
    - BUILD.md
    - 'js/web'
    - 'onnxruntime/core/providers/js'
pr:
  branches:
    include:
    - main
    - rel-*
  paths:
    exclude:
    - docs/**
    - README.md
    - CONTRIBUTING.md
    - BUILD.md
    - 'js/web'
    - 'onnxruntime/core/providers/js'
#### end trigger ####

parameters:

- name: QnnSdk
  displayName: QNN SDK version
  type: string
  default: 2.42.0.251225

jobs:
- job: 'BUILD_QNN_EP'
  pool:
    name: 'onnxruntime-qnn-windows-vs-2022-arm64'
    demands:
      - Agent.Version -equals 4.264.2
  variables:
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
    buildArch: arm64
    BuildConfig: 'RelWithDebInfo'
    ALLOW_RELEASED_ONNX_OPSET_ONLY: '1'
  timeoutInMinutes: 240
  workspace:
    clean: all
  strategy:
    matrix:
      SHARED_LIB:
        QnnLibKind: 'shared_lib'
        # We currently do not have a standalone Windows ARM64 CI pipeline for the CPU EP,
        # so we enable --enable_arm_neon_nchwc for additional coverage of the NCHWc code paths in the CPU EP.
        # Once we have a standalone Windows ARM64 CI pipeline for the CPU EP, we can consider adding --enable_arm_neon_nchwc
        # to that pipeline and removing it from this pipeline since this pipeline is primarily for testing the QNN EP.
        ExtraQnnBuildArgs: '--client_package_build --enable_arm_neon_nchwc'
      STATIC_LIB:
        QnnLibKind: 'static_lib'
        ExtraQnnBuildArgs: ''
      SHARED_LIB_GENERIC_INTERFACE:
        QnnLibKind: 'shared_lib'
        # Note: Building ORT with generic ep interface which only builds the provider-bridge APIs for
        # various EPs, but does not build the actual EPs. We enable --build_wheel for additional code coverage
        # because the python bindings also use the USE_<EP>_PROVIDER_INTERFACE preprocessor macros.
        ExtraQnnBuildArgs: '--enable_generic_interface --build_wheel'
  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.x'
      addToPath: true
      architecture: $(buildArch)

  # onnx (pinned to cmake/deps.txt) + numpy (pinned to requirements.txt, python-conditional) are
  # required at configure time by the onnxruntime_MATERIALIZE_ONNX_NODE_TESTS gate, which
  # regenerates the onnx node-test corpus into the build tree (onnx_node_tests/node) for
  # onnx_test_runner. The numpy markers self-select the same pin the CMake gate asserts.
  - script: python -m pip install onnx==1.22.0 "numpy==2.2.6; python_version<'3.11'" "numpy==2.4.2; python_version>='3.11'"
    displayName: Install onnx for node-test materialization

  - task: NuGetToolInstaller@1
    inputs:
      versionSpec: 6.4.x

  - template: templates/jobs/download_win_qnn_sdk.yml
    parameters:
      QnnSDKVersion: ${{ parameters.QnnSdk }}

  - task: PythonScript@0
    displayName: 'Build'
    inputs:
      scriptPath: '$(Build.SourcesDirectory)\tools\ci_build\build.py'
      arguments: >-
        --config $(BuildConfig)
        --build_dir $(Build.BinariesDirectory)
        --cmake_generator "Visual Studio 17 2022"
        --build_shared_lib --use_vcpkg --use_vcpkg_ms_internal_asset_cache
        --use_qnn $(QnnLibKind)
        --qnn_home $(QnnSDKRootDir)
        --cmake_extra_defines onnxruntime_MATERIALIZE_ONNX_NODE_TESTS=ON
        --update --build --parallel $(ExtraQnnBuildArgs)

  - script: |
      python $(Build.SourcesDirectory)\tools\ci_build\build.py ^
        --config $(BuildConfig) ^
        --build_dir $(Build.BinariesDirectory) ^
        --cmake_generator "Visual Studio 17 2022" ^
        --build_shared_lib ^
        --use_qnn $(QnnLibKind) ^
        --qnn_home $(QnnSDKRootDir) ^
        --test --enable_onnx_tests $(ExtraQnnBuildArgs)
    displayName: 'Run unit tests'

  - script: |
     rem onnx#7959 collapse sentinel: -m 1 fails loud if 0 node tests are collected (e.g. a
     rem MATERIALIZE=OFF leg still running this dir). Low value (not the 1500 build floor)
     rem because -e qnn legitimately reduces the set to ~1529; strict count enforced at build via --min-cases.
     .\$(BuildConfig)\onnx_test_runner -j 1 -v -m 1 -e qnn -i "backend_path|$(QnnSDKRootDir)\lib\aarch64-windows-msvc\QnnCpu.dll" $(Build.BinariesDirectory)\$(BuildConfig)\onnx_node_tests\node
    workingDirectory: '$(Build.BinariesDirectory)\$(BuildConfig)'
    displayName: 'Run ONNX Tests'

  - script: |
     .\$(BuildConfig)\onnx_test_runner -j 1 -v -e qnn -i "backend_path|$(QnnSDKRootDir)\lib\aarch64-windows-msvc\QnnCpu.dll" C:\data\float32_models
    workingDirectory: '$(Build.BinariesDirectory)\$(BuildConfig)'
    displayName: 'Run float32 model tests'

  - script: |
     .\$(BuildConfig)\onnx_test_runner -j 1 -v -e qnn -i "backend_path|$(QnnSDKRootDir)\lib\aarch64-windows-msvc\QnnHtp.dll" C:\data\qdq_models
    workingDirectory: '$(Build.BinariesDirectory)\$(BuildConfig)'
    displayName: 'Run QDQ model tests'
    enabled: false

  - task: CopyFiles@2
    displayName: 'Create Artifact'
    inputs:
      SourceFolder: '$(Build.BinariesDirectory)\$(BuildConfig)\$(BuildConfig)'
      Contents: |
         *.exe
         *.dll
         *.pdb
         !Qnn*.dll
      TargetFolder: '$(Build.ArtifactStagingDirectory)'
      CleanTargetFolder: true
      OverWrite: true
    condition: and(succeeded(), and(ne(variables['Build.Reason'], 'PullRequest'), eq(variables['QnnLibKind'], 'shared_lib')))

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'internal_release'
      publishLocation: 'Container'
    condition: and(succeeded(), and(ne(variables['Build.Reason'], 'PullRequest'), eq(variables['QnnLibKind'], 'shared_lib')))
