# Ensures the Visual Studio components required to build the requested target
# architecture are present, installing them on demand when they are missing.
#
# - For x64/x86 targets this installs Microsoft.VisualStudio.Component.VC.Runtimes.x86.x64.Spectre.
#   These Spectre-mitigated MSVC runtime libraries are required by BinSkim-compliant builds that
#   pass --use_binskim_compliant_compile_flags (which adds /Qspectre). Without them CMake's compiler
#   probe fails with: MSB8040: Spectre-mitigated libraries are required for this project.
#
# - For arm64 targets this additionally installs the ARM64 cross-compiler tools
#   (Microsoft.VisualStudio.Component.VC.Tools.ARM64) and the ARM64 Spectre-mitigated runtimes
#   (Microsoft.VisualStudio.Component.VC.Runtimes.ARM64.Spectre). Without the ARM64 tools, CMake's
#   VCTargetsPath probe fails during configure with:
#     error : The BaseOutputPath/OutputPath property is not set for project 'VCTargetsPath.vcxproj'.
#     ... Configuration='Debug'  Platform='ARM64'.

parameters:
- name: architecture
  displayName: 'Target platform to verify (x64, x86, Win32, amd64, arm64, arm64x or ARM64EC)'
  type: string
  default: 'x64'

steps:
- task: PowerShell@2
  displayName: 'Install Visual Studio build components for ${{ parameters.architecture }}'
  condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))
  inputs:
    targetType: 'inline'
    script: |
      # Normalize the incoming platform name (callers pass MSBuild/sln platform names such
      # as Win32, amd64, arm64x or ARM64EC) into one of: arm64, x64 or x86.
      $rawArch = "${{ parameters.architecture }}".ToLowerInvariant()
      switch -Wildcard ($rawArch) {
        'arm64*' { $arch = 'arm64' }   # arm64, arm64x, arm64ec
        'win32'  { $arch = 'x86' }
        'x86'    { $arch = 'x86' }
        'amd64'  { $arch = 'x64' }
        'x64'    { $arch = 'x64' }
        default  { $arch = 'x64' }
      }
      Write-Host "Requested platform '$rawArch' normalized to target architecture '$arch'."

      # Determine which VS components must be present for the target architecture and
      # which paths under the MSVC tools directory prove they are installed. The paths are
      # host-independent (they live under lib\...), so the same check works on x64 agents
      # cross-compiling to arm64 and on native arm64 agents.
      # - arm64 needs the ARM64 cross-compiler tools (which create lib\arm64) plus the ARM64
      #   Spectre-mitigated runtimes (which create lib\spectre\arm64).
      # - x64/x86 only need the x86/x64 Spectre-mitigated runtimes (lib\spectre\<arch>).
      if ($arch -eq 'arm64') {
        $components = @(
          'Microsoft.VisualStudio.Component.VC.Tools.ARM64',
          'Microsoft.VisualStudio.Component.VC.Runtimes.ARM64.Spectre'
        )
        $requiredRelativePaths = @('lib\arm64', 'lib\spectre\arm64')
      } else {
        $components = @('Microsoft.VisualStudio.Component.VC.Runtimes.x86.x64.Spectre')
        $requiredRelativePaths = @("lib\spectre\$arch")
      }

      # Helper: resolve the MSVC tools directory (e.g. ...\VC\Tools\MSVC\<version>\).
      # VCToolsInstallDir is exported into the environment by the VS developer command
      # prompt (vcvarsall). When it is not set we fall back to vswhere + the default
      # tools version file.
      function Get-VCToolsDir {
        if ($env:VCToolsInstallDir) {
          return $env:VCToolsInstallDir.TrimEnd('\')
        }

        $vswherePath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (-not (Test-Path $vswherePath)) { return $null }

        $vsInstallPath = & $vswherePath -latest -property installationPath 2>$null
        if (-not $vsInstallPath) { return $null }

        $toolsVersionFile = Join-Path $vsInstallPath "VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt"
        if (-not (Test-Path $toolsVersionFile)) { return $null }

        $toolsVersion = (Get-Content $toolsVersionFile -Raw).Trim()
        return (Join-Path $vsInstallPath "VC\Tools\MSVC\$toolsVersion")
      }

      # Helper: are all required files/directories present under the MSVC tools dir?
      function Test-ComponentsPresent {
        $vcToolsDir = Get-VCToolsDir
        if (-not $vcToolsDir) { return $false }

        foreach ($relative in $requiredRelativePaths) {
          $full = Join-Path $vcToolsDir $relative
          if (-not (Test-Path $full)) {
            Write-Host "Missing required component file: $full"
            return $false
          }
        }
        return $true
      }

      if (Test-ComponentsPresent) {
        Write-Host "Required Visual Studio components for '$arch' are already present."
        exit 0
      }

      Write-Host "Installing Visual Studio components for '$arch': $($components -join ', ')"

      # Locate the Visual Studio Installer.
      $vsInstallerPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
      if (-not (Test-Path $vsInstallerPath)) {
        Write-Error "vs_installer.exe not found at: $vsInstallerPath. Cannot install required components."
        exit 1
      }

      # Determine the VS installation path (needed for the 'modify' command).
      $vswherePath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
      if (-not (Test-Path $vswherePath)) {
        Write-Error "vswhere.exe not found at: $vswherePath"
        exit 1
      }
      $vsInstallPath = & $vswherePath -latest -property installationPath 2>$null
      if (-not $vsInstallPath) {
        Write-Error "Could not determine Visual Studio installation path via vswhere."
        exit 1
      }

      Write-Host "Visual Studio installation path: $vsInstallPath"
      Write-Host "Invoking VS Installer to add the required components..."

      # Build the argument list: one --add per component. Invoke directly so PowerShell
      # preserves the install path as a single argument.
      $installerArgs = @('modify', '--installPath', $vsInstallPath)
      foreach ($component in $components) {
        $installerArgs += @('--add', $component)
      }
      $installerArgs += @('--includeRecommended', '--passive', '--norestart')

      & $vsInstallerPath @installerArgs
      $installerExitCode = $LASTEXITCODE

      if ($installerExitCode -notin @(0, 3010)) {
        Get-ChildItem -Path $env:TEMP -Filter "dd_*.log" -ErrorAction SilentlyContinue |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 3 |
          ForEach-Object {
            Write-Host "Last 50 lines of Visual Studio Installer log: $($_.FullName)"
            Get-Content $_.FullName -Tail 50
          }
        Write-Error "VS Installer exited with code $installerExitCode. Component installation failed."
        exit 1
      }

      # Verify the components are now present.
      if (Test-ComponentsPresent) {
        Write-Host "Successfully installed the required Visual Studio components for '$arch'."
      } else {
        Write-Error "Required Visual Studio components for '$arch' still not found after installation."
        exit 1
      }
