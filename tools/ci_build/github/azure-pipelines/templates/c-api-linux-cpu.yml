# This file contains the ADO job that build libonnxruntime.so on Linux
parameters:
- name: AdditionalBuildFlags
  displayName: Additional build flags for build.py
  type: string
  default: ''

- name: OnnxruntimeArch
  type: string

- name: OnnxruntimeNodejsBindingArch
  type: string
  values:
  - arm64
  - x64

- name: PoolName
  type: string
  default: 'onnxruntime-Ubuntu2404-AMD-CPU'

- name: ArtifactNamePrefix
  type: string
  default: "onnxruntime"

- name: PackageJava
  type: boolean
  default: true

- name: PackageNodejs
  type: boolean
  default: true

jobs:
- job: Linux_C_API_Packaging_CPU_${{parameters.OnnxruntimeArch}}

  workspace:
    clean: all
  timeoutInMinutes: 210
  pool:
    name: ${{parameters.PoolName}}
    os: linux
    ${{ if eq(parameters.OnnxruntimeArch, 'aarch64') }}:
      hostArchitecture: Arm64
  steps:
  - checkout: self
    clean: true
    submodules: none

  # Authenticate to Lotus to pull pip in UsePythonVersion task
  - template: setup-feeds-and-python-steps.yml
    parameters:
      architecture: ${{ parameters.OnnxruntimeArch }}

  - template: ./steps/ccache-and-vcpkg.yml

  - template: set-version-number-variables-step.yml

  - ${{ if eq(parameters.OnnxruntimeArch, 'x64') }}:
    - template: get-docker-image-steps.yml
      parameters:
        Dockerfile: tools/ci_build/github/linux/docker/inference/x86_64/default/cpu/Dockerfile
        Context: tools/ci_build/github/linux/docker/inference/x86_64/default/cpu
        DockerBuildArgs: "--build-arg BUILD_UID=$( id -u )"
        Repository: onnxruntimecpubuildcentos8${{parameters.OnnxruntimeArch}}_packaging

  - ${{ if eq(parameters.OnnxruntimeArch, 'aarch64') }}:
    - template: get-docker-image-steps.yml
      parameters:
        Dockerfile: tools/ci_build/github/linux/docker/inference/aarch64/default/cpu/Dockerfile
        Context: tools/ci_build/github/linux/docker/inference/aarch64/default/cpu
        DockerBuildArgs: "--build-arg BUILD_UID=$( id -u )"
        Repository: onnxruntimecpubuildcentos8${{parameters.OnnxruntimeArch}}_packaging

  - task: CmdLine@2
    inputs:
      script: |
        set -e -x
        mkdir -p "${HOME}/.onnx"

        # HACK: so the docker user can write to the caches
        mkdir -p "${CCACHE_DIR}"
        mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"
        chmod -R 777 "${CCACHE_DIR}"
        chmod -R 777 "${VCPKG_DEFAULT_BINARY_CACHE}"

        docker run \
          --rm \
          --volume "/data/onnx:/data/onnx:ro" \
          --volume "${BUILD_BINARIESDIRECTORY}:/build" \
          --volume "${BUILD_SOURCESDIRECTORY}:/onnxruntime_src" \
          --volume "${CCACHE_DIR}:/cache/ccache" \
          --volume "${HOME}/.gradle:/home/onnxruntimedev/.gradle" \
          --volume "${HOME}/.m2:/home/onnxruntimedev/.m2:ro" \
          --volume "${HOME}/.onnx:/home/onnxruntimedev/.onnx" \
          --volume "${NPM_CONFIG_USERCONFIG}:/tmp/.npmrc:ro" \
          --volume "${VCPKG_DEFAULT_BINARY_CACHE}:/cache/vcpkg" \
          -e CCACHE_DIR=/cache/ccache \
          -e NIGHTLY_BUILD \
          -e NPM_CONFIG_USERCONFIG=/tmp/.npmrc \
          -e PIP_INDEX_URL \
          -e SYSTEM_COLLECTIONURI \
          -e VCPKG_DEFAULT_BINARY_CACHE=/cache/vcpkg \
          onnxruntimecpubuildcentos8${{parameters.OnnxruntimeArch}}_packaging \
          /bin/bash -c \
            "ccache --zero-stats \
            && python3 /onnxruntime_src/tools/ci_build/build.py \
              --build_dir /build \
              --build_java \
              --build_nodejs \
              --build_shared_lib \
              --config Release \
              --enable_lto \
              --parallel \
              --skip_submodule_sync \
              --use_binskim_compliant_compile_flags \
              --use_cache \
              --use_vcpkg \
              --use_vcpkg_ms_internal_asset_cache \
              ${{ parameters.AdditionalBuildFlags }} \
            && ccache --show-stats -vv \
            && cd /build/Release \
            && make install DESTDIR=/build/installed"

        mkdir -p "${BUILD_ARTIFACTSTAGINGDIRECTORY}/testdata"
        cp "${BUILD_BINARIESDIRECTORY}"/Release/libcustom_op_library.so* "${BUILD_ARTIFACTSTAGINGDIRECTORY}/testdata"
        ls -al "${BUILD_ARTIFACTSTAGINGDIRECTORY}"
    displayName: 'Create Artifacts'

  - ${{ if eq(parameters.PackageJava, 'true') }}:
    - template: java-api-artifacts-package-and-publish-steps-posix.yml
      parameters:
        arch: 'linux-${{parameters.OnnxruntimeArch}}'
        buildConfig: 'Release'
        artifactName: 'onnxruntime-java-linux-${{parameters.OnnxruntimeArch}}'
        libraryName: 'libonnxruntime.so'
        nativeLibraryName: 'libonnxruntime4j_jni.so'

  - template: c-api-artifacts-package-and-publish-steps-posix.yml
    parameters:
      buildConfig: 'Release'
      artifactName: '${{parameters.ArtifactNamePrefix}}-linux-${{parameters.OnnxruntimeArch}}-$(OnnxRuntimeVersion)'
      artifactNameNoVersionString: '${{parameters.ArtifactNamePrefix}}-linux-${{parameters.OnnxruntimeArch}}'
      libraryName: 'libonnxruntime.so.$(OnnxRuntimeVersion)'

  - ${{ if eq(parameters.PackageNodejs, 'true') }}:
    - template: nodejs-artifacts-package-and-publish-steps-posix.yml
      parameters:
        arch: '${{parameters.OnnxruntimeNodejsBindingArch}}'
        os: 'linux'
        artifactName: 'drop-onnxruntime-nodejs-linux-${{parameters.OnnxruntimeArch}}'
