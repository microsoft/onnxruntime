variables:
  common_trt_version: '10.13.3.9'
  # As for Debian installation, replace '-1.' by '-1+' when assigning trt version below
  linux_trt_version_cuda13: ${{ variables.common_trt_version }}-1.cuda13.0
  linux_trt_version_cuda12: ${{ variables.common_trt_version }}-1.cuda12.9
  win_trt_folder_cuda13: TensorRT-${{ variables.common_trt_version }}.Windows10.x86_64.cuda-13.0
  win_trt_folder_cuda12: TensorRT-${{ variables.common_trt_version }}.Windows10.x86_64.cuda-12.9
