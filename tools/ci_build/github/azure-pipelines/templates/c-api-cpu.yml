parameters:
- name: RunOnnxRuntimeTests
  displayName: Run Tests?
  type: boolean
  default: true

- name: IsReleaseBuild
  displayName: Is a release build? Set it to true if you are doing an Onnx Runtime release.
  type: boolean
  default: false

- name: PreReleaseVersionSuffixString
  displayName: Suffix added to pre-release package version. Only used if IsReleaseBuild is true. Denotes the type of pre-release package.
  type: string
  values:
  - alpha
  - beta
  - rc
  - none

- name: PreReleaseVersionSuffixNumber
  displayName: Number added to pre-release package version. Only used if IsReleaseBuild is true. Denotes the sequence of a pre-release package.
  type: number

- name: AdditionalBuildFlags
  displayName: Additional build flags for build.py
  type: string
  default: ''

- name: AdditionalWinBuildFlags
  displayName: Additional build flags that just for Windows Builds
  type: string
  default: ''

- name: OrtNugetPackageId
  displayName: Package name for nuget
  type: string
  default: 'Microsoft.ML.OnnxRuntime'

- name: BuildVariant
  type: string
  default: 'default'

# Do not update this to a version that does not exist for the qnn-runtime Maven package:
# https://mvnrepository.com/artifact/com.qualcomm.qti/qnn-runtime
- name: QnnSDKVersion
  displayName: QNN SDK Version
  type: string
  default: 2.42.0.251225

- name: is1ES
  displayName: Is 1ES pipeline
  type: boolean
  default: false

stages:
- template: linux-cpu-packaging-pipeline.yml
  parameters:
    AdditionalBuildFlags: ${{ parameters.AdditionalBuildFlags }}

- template: mac-cpu-packaging-pipeline.yml
  parameters:
    AllowReleasedOpsetOnly: 1
    DoEsrp: true

- stage: Android_Java_API_AAR_Packaging_Full
  dependsOn: Setup # Setup stage defined in set_packaging_variables_stage.yml creates the ReleaseVersionSuffix variable
  variables:
    ReleaseVersionSuffix: $[stageDependencies.Setup.Set_Variables.outputs['Set_Release_Version_Suffix.ReleaseVersionSuffix']]
  jobs:
  - template: android-java-api-aar.yml
    parameters:
      buildConfig: 'Release'
      buildSettings: '$(Build.SourcesDirectory)/tools/ci_build/github/android/default_full_aar_build_settings.json'
      artifactName: 'onnxruntime-android-full-aar'
      job_name_suffix: 'Full'
      publish_executables: '1'
      enable_code_sign: true
      packageName: 'onnxruntime-android'
      ReleaseVersionSuffix: $(ReleaseVersionSuffix)
      is1ES: ${{ parameters.is1ES }}



- stage: Android_Java_API_AAR_Packaging_QNN
  dependsOn: Setup # Setup stage defined in set_packaging_variables_stage.yml creates the ReleaseVersionSuffix variable
  variables:
    ReleaseVersionSuffix: $[stageDependencies.Setup.Set_Variables.outputs['Set_Release_Version_Suffix.ReleaseVersionSuffix']]
  jobs:
  - template: android-java-api-aar.yml
    parameters:
      buildConfig: 'Release'
      buildSettings: '$(Build.SourcesDirectory)/tools/ci_build/github/android/default_qnn_aar_build_settings.json'
      artifactName: 'onnxruntime-android-qnn-aar'
      job_name_suffix: 'QNN'
      publish_executables: '0'
      enable_code_sign: true
      packageName: 'onnxruntime-android-qnn'
      ReleaseVersionSuffix: $(ReleaseVersionSuffix)
      QnnSDKVersion: ${{ parameters.QnnSDKVersion }}
      is1ES: ${{ parameters.is1ES }}

- stage: iOS_Full_xcframework
  dependsOn: []
  variables:
    xcodeVersion: "26.3"
    iosSimulatorRuntimeVersion: "26.2"
  jobs:
  - job: iOS_Full_xcframework
    workspace:
      clean: all
    pool:
      name: AcesShared
      os: macOS
      demands:
      - ImageOverride -equals ACES_VM_SharedPool_Sequoia

    timeoutInMinutes: 300
    steps:
    - template: set-version-number-variables-step.yml

    - template: use-xcode-version.yml
      parameters:
        xcodeVersion: ${{ variables.xcodeVersion }}

    - template: setup-build-tools.yml
      parameters:
        host_cpu_arch: arm64

    - script: |
        set -e -x
        python3 tools/ci_build/github/apple/build_apple_framework.py \
          --build_dir "$(Build.BinariesDirectory)/ios_framework" \
          tools/ci_build/github/apple/default_full_ios_framework_build_settings.json
      displayName: "Build Apple xcframework"

    - script: |
        set -e -x

        # Stage onnxruntime.xcframework as artifact.
        mkdir -p $(Build.BinariesDirectory)/artifacts/xcframework

        pushd $(Build.BinariesDirectory)/ios_framework/framework_out
        zip -vry $(Build.BinariesDirectory)/artifacts/xcframework/onnxruntime_ios_xcframework.$(OnnxRuntimeVersion).zip \
          onnxruntime.xcframework
        popd

        # Stage framework_out and xcframework_info.json as test artifact.
        # Note: framework_out has another copy of onnxruntime.xcframework. This duplication is simpler than
        # reconstructing the test files from two separate pipeline artifacts.
        mkdir -p $(Build.BinariesDirectory)/artifacts/test

        pushd $(Build.BinariesDirectory)/ios_framework
        zip -vry $(Build.BinariesDirectory)/artifacts/test/test_files.zip \
          framework_out xcframework_info.json
        popd
      displayName: "Stage artifacts"

    - task: 1ES.PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.BinariesDirectory)/artifacts/xcframework'
        artifactName: 'onnxruntime-ios-full-xcframework'

    - task: 1ES.PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.BinariesDirectory)/artifacts/test'
        artifactName: 'onnxruntime-ios-full-xcframework-test'

  # Run the framework test on a Microsoft-hosted macOS image, which has the required iOS simulator runtime.
  # The build above stays on the faster ACES pool; only this lighter test job uses the hosted image.
  # It consumes the onnxruntime-ios-full-xcframework-test artifact published by the build job.
  - job: iOS_Full_xcframework_test
    dependsOn: iOS_Full_xcframework
    workspace:
      clean: all
    pool:
      name: "Azure Pipelines"
      image: "macOS-15"
      os: macOS
    timeoutInMinutes: 90
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: 'onnxruntime-ios-full-xcframework-test'
        targetPath: '$(Build.BinariesDirectory)/artifacts/test'
    steps:
    - checkout: self

    - template: use-xcode-version.yml
      parameters:
        xcodeVersion: ${{ variables.xcodeVersion }}

    - template: setup-build-tools.yml
      parameters:
        host_cpu_arch: arm64

    - script: |
        set -e -x
        unzip "$(Build.BinariesDirectory)/artifacts/test/test_files.zip" -d "$(Build.BinariesDirectory)"
      displayName: "Extract test files"

    - script: |
        python3 tools/ci_build/github/apple/test_apple_packages.py \
          --framework_info_file "$(Build.BinariesDirectory)/xcframework_info.json" \
          --c_framework_dir "$(Build.BinariesDirectory)/framework_out" \
          --skip_macos_test \
          --mac_catalyst_enabled
      displayName: "Test Apple framework"
      env:
        ORT_GET_SIMULATOR_DEVICE_INFO_REQUESTED_RUNTIME_VERSION: ${{ variables.iosSimulatorRuntimeVersion }}

- template: win-ci.yml
  parameters:
    DoEsrp: true
    stage_name_suffix: CPU_arm64_${{ parameters.BuildVariant }}
    buildArch: x64
    msbuildPlatform: arm64
    packageName: arm64
    buildparameter: --arm64 ${{ parameters.AdditionalBuildFlags }}  ${{ parameters.AdditionalWinBuildFlags}}
    runTests: false
    buildJava: false
    buildNodejs: false
    PreReleaseVersionSuffixString: ${{ parameters.PreReleaseVersionSuffixString }}
    PreReleaseVersionSuffixNumber: ${{ parameters.PreReleaseVersionSuffixNumber }}

- template: win-ci.yml
  parameters:
    DoEsrp: true
    stage_name_suffix: CPU_arm64x_${{ parameters.BuildVariant }}
    buildArch: x64
    msbuildPlatform: arm64x
    packageName: arm64x
    buildparameter: ${{ parameters.AdditionalBuildFlags }} ${{ parameters.AdditionalWinBuildFlags}}
    runTests: false
    buildJava: false
    buildNodejs: false
    PreReleaseVersionSuffixString: ${{ parameters.PreReleaseVersionSuffixString }}
    PreReleaseVersionSuffixNumber: ${{ parameters.PreReleaseVersionSuffixNumber }}

- template: win-ci.yml
  parameters:
    DoEsrp: true
    stage_name_suffix: CPU_x64_${{ parameters.BuildVariant }}
    buildArch: x64
    msbuildPlatform: x64
    packageName: x64
    buildparameter: --build_java ${{ parameters.AdditionalBuildFlags }}  ${{ parameters.AdditionalWinBuildFlags}}
    runTests: ${{ parameters.RunOnnxRuntimeTests }}
    buildJava: true
    buildNodejs: false
    PreReleaseVersionSuffixString: ${{ parameters.PreReleaseVersionSuffixString }}
    PreReleaseVersionSuffixNumber: ${{ parameters.PreReleaseVersionSuffixNumber }}

- stage: Jar_Packaging
  dependsOn:
  - Linux_C_API_Packaging_CPU
  - MacOS_C_API_Packaging_CPU
  - Windows_Packaging_CPU_x64_${{ parameters.BuildVariant }}
  condition: succeeded()
  jobs:
  - job: Jar_Packaging
    workspace:
      clean: all
    pool:
      name: 'onnxruntime-Win-CPU-VS2022-Latest'
      os: windows
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: drop-onnxruntime-java-win-x64
        targetPath: '$(Build.BinariesDirectory)\java-artifact\onnxruntime-java-win-x64'

      - input: pipelineArtifact
        artifactName: drop-onnxruntime-java-linux-x64
        targetPath: '$(Build.BinariesDirectory)\java-artifact\onnxruntime-java-linux-x64'

      - input: pipelineArtifact
        artifactName: drop-onnxruntime-java-linux-aarch64
        targetPath: '$(Build.BinariesDirectory)\java-artifact\onnxruntime-java-linux-aarch64'

      - input: pipelineArtifact
        artifactName: drop-onnxruntime-java-osx-arm64
        targetPath: '$(Build.BinariesDirectory)\java-artifact\onnxruntime-java-osx-arm64'
      outputs:
      - output: pipelineArtifact
        targetPath: $(Build.BinariesDirectory)\java-artifact\onnxruntime-java-win-x64
        artifactName: onnxruntime-java

    steps:
    - template: jar-packaging.yml
      parameters:
        package_type: cpu

- stage: NuGet_Packaging_CPU
  dependsOn:
  - Setup
  - Linux_C_API_Packaging_CPU
  - MacOS_C_API_Package_Publish
  - Windows_Packaging_CPU_x64_${{ parameters.BuildVariant }}
  - Windows_Packaging_CPU_arm64_${{ parameters.BuildVariant }}
  - Android_Java_API_AAR_Packaging_Full
  - iOS_Full_xcframework
  condition: succeeded()
  jobs:
  - job: NuGet_Packaging_CPU
    workspace:
      clean: all
    pool:
      name: 'onnxruntime-Win-CPU-VS2022-Latest'
      os: windows
    templateContext:
      sdl:
        codeSignValidation:
          enabled: true
          break: false
        binskim:
          enabled: true
          scanOutputDirectoryOnly: true
      inputs:
        - input: pipelineArtifact
          artifactName: onnxruntime-win-x64
          targetPath: $(Build.BinariesDirectory)/nuget-artifact
        - input: pipelineArtifact
          artifactName: onnxruntime-win-arm64
          targetPath: $(Build.BinariesDirectory)/nuget-artifact
        - input: pipelineArtifact
          artifactName: onnxruntime-osx
          targetPath: $(Build.BinariesDirectory)/nuget-artifact
        - input: pipelineArtifact
          artifactName: onnxruntime-linux-x64
          targetPath: $(Build.BinariesDirectory)/nuget-artifact
        - input: pipelineArtifact
          artifactName: onnxruntime-linux-aarch64
          targetPath: $(Build.BinariesDirectory)/nuget-artifact
        - input: pipelineArtifact
          artifactName: onnxruntime-ios-full-xcframework
          targetPath: $(Build.BinariesDirectory)/nuget-artifact
        - input: pipelineArtifact
          artifactName: onnxruntime-android-full-aar
          targetPath: $(Build.BinariesDirectory)/nuget-artifact
      outputs:
      - output: pipelineArtifact
        targetPath: $(Build.ArtifactStagingDirectory)
        artifactName: 'drop-signed-nuget-CPU'

    variables:
      OrtPackageId: ${{ parameters.OrtNugetPackageId }}
      ReleaseVersionSuffix: $[stageDependencies.Setup.Set_Variables.outputs['Set_Release_Version_Suffix.ReleaseVersionSuffix']]

    steps:
    - checkout: self
      submodules: true

    - script: |
        dir
      workingDirectory: '$(Build.BinariesDirectory)/nuget-artifact'
      displayName: 'List artifacts'

    - template: set-version-number-variables-step.yml

    # Reconstruct the build dir
    - task: PowerShell@2
      displayName: 'Extract native libraries for addition to nuget native package'
      inputs:
        targetType: filePath
        filePath: $(Build.SourcesDirectory)\tools\ci_build\github\windows\extract_nuget_files.ps1

    - script: |
        mklink /D /J models C:\local\models
      workingDirectory: '$(Build.BinariesDirectory)'
      displayName: 'Create models link'
    - task: NuGetToolInstaller@0
      displayName: Use Nuget 6.10.x
      inputs:
        versionSpec: 6.10.x

    - task: PowerShell@2
      displayName: Install mobile workloads
      inputs:
        targetType: 'inline'
        script: |
          dotnet workload install android ios maccatalyst
        workingDirectory: '$(Build.SourcesDirectory)\csharp'

    - task: MSBuild@1
      displayName: 'Restore NuGet Packages and create project.assets.json'
      inputs:
        solution: '$(Build.SourcesDirectory)\csharp\OnnxRuntime.CSharp.sln'
        platform: 'Any CPU'
        configuration: RelWithDebInfo
        msbuildArguments: '-t:restore -p:OrtPackageId=$(OrtPackageId)'
        workingDirectory: '$(Build.SourcesDirectory)\csharp'

    - task: MSBuild@1
      displayName: 'Build C# bindings'
      inputs:
        solution: '$(Build.SourcesDirectory)\csharp\OnnxRuntime.CSharp.sln'
        platform: 'Any CPU'
        configuration: RelWithDebInfo
        msbuildArguments: '-p:OnnxRuntimeBuildDirectory="$(Build.BinariesDirectory)" -p:OrtPackageId=$(OrtPackageId) -p:IsReleaseBuild=${{ parameters.IsReleaseBuild }} -p:ReleaseVersionSuffix=$(ReleaseVersionSuffix) -p:PackageVersion=$(OnnxRuntimeVersion)'
        workingDirectory: '$(Build.SourcesDirectory)\csharp'

    - template: win-esrp-dll.yml
      parameters:
        FolderPath: '$(Build.SourcesDirectory)\csharp\src\Microsoft.ML.OnnxRuntime\bin\RelWithDebInfo'
        DisplayName: 'ESRP - Sign C# dlls'
        DoEsrp: true

    - template: setup-feeds-and-python-steps.yml

    - task: MSBuild@1
      displayName: 'Build Nuget Packages'
      inputs:
        solution: '$(Build.SourcesDirectory)\csharp\OnnxRuntime.CSharp.proj'
        platform: 'Any CPU'
        configuration: RelWithDebInfo
        msbuildArguments: >-
          -t:CreatePackage
          "-p:OnnxRuntimeBuildDirectory=$(Build.BinariesDirectory)"
          "-p:OrtPackageId=$(OrtPackageId)"
          "-p:IsReleaseBuild=${{ parameters.IsReleaseBuild }}"
          "-p:ReleaseVersionSuffix=$(ReleaseVersionSuffix)"
          "-p:CurrentTime=$(ORT_CI_BUILD_TIME)"
          "-p:CurrentDate=$(ORT_CI_BUILD_DATE)"
        workingDirectory: '$(Build.SourcesDirectory)\csharp'

    - task: CopyFiles@2
      displayName: 'Copy native nuget package to: $(Build.ArtifactStagingDirectory)'
      inputs:
        SourceFolder: '$(Build.BinariesDirectory)\RelWithDebInfo\RelWithDebInfo'
        Contents: '*.nupkg'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: CopyFiles@2
      displayName: 'Copy native nuget symbols package to: $(Build.ArtifactStagingDirectory)'
      inputs:
        SourceFolder: '$(Build.BinariesDirectory)\RelWithDebInfo\RelWithDebInfo'
        Contents: '*.snupkg'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: CopyFiles@2
      displayName: 'Copy managed nuget package to: $(Build.ArtifactStagingDirectory)'
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)\csharp\src\Microsoft.ML.OnnxRuntime\bin\RelWithDebInfo'
        Contents: '*.nupkg'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - template: esrp_nuget.yml
      parameters:
        DisplayName: 'ESRP - sign NuGet package'
        FolderPath: '$(Build.ArtifactStagingDirectory)'
        DoEsrp: true


- template: ../stages/nodejs-npm-packaging-stage.yml
  parameters:
    IsReleaseBuild: ${{ parameters.IsReleaseBuild }}
    PreReleaseVersionSuffixString: ${{ parameters.PreReleaseVersionSuffixString }}
