parameters:
- name: build_py_parameters
  displayName: >
    Extra parameters to pass to build.py. Don't put newlines in here.
  type: string
  default: ''

# TODO: Now the Windows jobs use a different cmake build type. Consider to merge it.
- name: cmake_build_type
  type: string
  displayName: 'Linux packages cmake build type. Linux Only.'
  default: 'Release'
  values:
   - Debug
   - Release
   - RelWithDebInfo
   - MinSizeRel

- name: cuda_version
  type: string
  displayName: 'CUDA version. Windows Only.'
  default: '12.8'
  values:
   - 12.8
   - 13.0

- name: cudnn_folder
  type: string
  default: '9.14.0.64_cuda13'

- name: PythonVersions
  type: object
  displayName: 'Python versions to build'
  default:
    - '3.11'
    - '3.12'
    - '3.13'
    - '3.14'

- name: LinuxPythonConfigurations
  type: object
  displayName: 'Linux Python build configurations'
  default:
  - python_version: '3.11'
    docker_python_exe_path: '/opt/python/cp311-cp311/bin/python3.11'
  - python_version: '3.12'
    docker_python_exe_path: '/opt/python/cp312-cp312/bin/python3.12'
  - python_version: '3.13'
    docker_python_exe_path: '/opt/python/cp313-cp313/bin/python3.13'
  - python_version: '3.13t'
    docker_python_exe_path: '/opt/python/cp313-cp313t/bin/python3.13'
  - python_version: '3.14'
    docker_python_exe_path: '/opt/python/cp314-cp314/bin/python3.14'
  - python_version: '3.14t'
    docker_python_exe_path: '/opt/python/cp314-cp314t/bin/python3.14'

- name: cmake_cuda_archs
  type: string
  displayName: 'CMAKE_CUDA_ARCHITECTURES for Windows'

- name: docker_base_image
  type: string
  displayName: 'Linux x86_64 docker base image'

- name: docker_base_image_aarch64
  type: string
  displayName: 'Linux aarch64 docker base image'
  default: ''

- name: AArch64LinuxPythonConfigurations
  type: object
  displayName: 'aarch64 Linux Python build configurations'
  default: []

stages:
    # Use separated cudnn folder for CUDA 13.0 on Windows.
    - ${{ if eq(parameters.cuda_version, '13.0') }}:
      - ${{ each python_version in parameters.PythonVersions }}:
        - template: py-win-gpu-stage.yml
          parameters:
            PYTHON_VERSION: ${{ python_version }}
            EP_NAME: gpu
            CudaVersion: ${{ parameters.cuda_version }}
            EP_BUILD_FLAGS: --enable_lto --use_cuda --cuda_home=$(Agent.TempDirectory)\v${{ parameters.cuda_version }} --cudnn_home=$(Agent.TempDirectory)\${{ parameters.cudnn_folder }} --cmake_extra_defines "CMAKE_CUDA_ARCHITECTURES=${{ parameters.cmake_cuda_archs }}"
            use_tensorrt: True

    - ${{ if eq(parameters.cuda_version, '12.8') }}:
      - ${{ each python_version in parameters.PythonVersions }}:
        - template: py-win-gpu-stage.yml
          parameters:
            PYTHON_VERSION: ${{ python_version }}
            EP_NAME: gpu
            CudaVersion: ${{ parameters.cuda_version }}
            EP_BUILD_FLAGS: --enable_lto --use_cuda --cuda_home=$(Agent.TempDirectory)\v${{ parameters.cuda_version }} --cmake_extra_defines "CMAKE_CUDA_ARCHITECTURES=${{ parameters.cmake_cuda_archs }}"
            use_tensorrt: True

    # Linux: one parallel stage per Python version
    - ${{ each config in parameters.LinuxPythonConfigurations }}:
      - template: py-linux-gpu-stage.yml
        parameters:
          stage_name: Linux_py_GPU_Wheels_x86_64_${{ replace(config.python_version, '.', '_') }}
          arch: 'x86_64'
          machine_pool: 'onnxruntime-Ubuntu2404-AMD-CPU'
          extra_build_arg: ${{ parameters.build_py_parameters }}
          cmake_build_type: ${{ parameters.cmake_build_type }}
          cuda_version: ${{ parameters.cuda_version }}
          docker_base_image: ${{ parameters.docker_base_image }}
          python_version: ${{ config.python_version }}
          docker_python_exe_path: ${{ config.docker_python_exe_path }}
          wheel_artifact_name: onnxruntime_gpu_${{ replace(config.python_version, '.', '_') }}
          # Only publish the large build intermediates artifact for Python 3.12. That's the only version we test now.
          ${{ if eq(config.python_version, '3.12') }}:
            build_intermediates_artifact_name: linux_gpu_wheel_x86_64

    # Linux aarch64: one parallel stage per Python version
    - ${{ each config in parameters.AArch64LinuxPythonConfigurations }}:
      - template: py-linux-gpu-stage.yml
        parameters:
          stage_name: Linux_py_GPU_Wheels_aarch64_${{ replace(config.python_version, '.', '_') }}
          arch: 'aarch64'
          machine_pool: 'onnxruntime-linux-ARM64-CPU-2019'
          extra_build_arg: ${{ parameters.build_py_parameters }}
          cmake_build_type: ${{ parameters.cmake_build_type }}
          cuda_version: ${{ parameters.cuda_version }}
          docker_base_image: ${{ parameters.docker_base_image_aarch64 }}
          python_version: ${{ config.python_version }}
          docker_python_exe_path: ${{ config.docker_python_exe_path }}
          wheel_artifact_name: onnxruntime_gpu_aarch64_${{ replace(config.python_version, '.', '_') }}
          ${{ if eq(config.python_version, '3.12') }}:
            build_intermediates_artifact_name: linux_gpu_wheel_aarch64

    # Merge per-version Linux wheel artifacts into a single combined artifact for downstream consumers
    - stage: Linux_py_GPU_Wheels_Merge_Artifacts
      dependsOn:
      - ${{ each config in parameters.LinuxPythonConfigurations }}:
        - Linux_py_GPU_Wheels_x86_64_${{ replace(config.python_version, '.', '_') }}
      - ${{ each config in parameters.AArch64LinuxPythonConfigurations }}:
        - Linux_py_GPU_Wheels_aarch64_${{ replace(config.python_version, '.', '_') }}
      jobs:
      - job: Linux_py_GPU_Wheels_Merge_Artifacts
        workspace:
          clean: all
        pool:
          name: 'onnxruntime-Ubuntu2404-AMD-CPU'
          os: linux
        templateContext:
          outputs:
          - output: pipelineArtifact
            targetPath: $(Build.ArtifactStagingDirectory)/onnxruntime_gpu
            artifactName: onnxruntime_gpu
        steps:
        - checkout: self
          clean: true
          submodules: none

        - ${{ each config in parameters.LinuxPythonConfigurations }}:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download wheel - Python ${{ config.python_version }}'
            inputs:
              artifact: onnxruntime_gpu_${{ replace(config.python_version, '.', '_') }}
              targetPath: $(Build.ArtifactStagingDirectory)/onnxruntime_gpu

        - ${{ each config in parameters.AArch64LinuxPythonConfigurations }}:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download wheel - aarch64 Python ${{ config.python_version }}'
            inputs:
              artifact: onnxruntime_gpu_aarch64_${{ replace(config.python_version, '.', '_') }}
              targetPath: $(Build.ArtifactStagingDirectory)/onnxruntime_gpu
