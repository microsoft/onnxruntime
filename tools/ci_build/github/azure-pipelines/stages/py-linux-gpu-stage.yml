parameters:
- name: arch
  type: string

- name: machine_pool
  type: string

- name: extra_build_arg
  type: string
  default: ''

- name: cmake_build_type
  type: string
  default: 'Release'
  values:
   - Debug
   - Release
   - RelWithDebInfo
   - MinSizeRel

- name: docker_base_image
  type: string

- name: cuda_version
  type: string
  default: '12.8'
  values:
   - 12.8
   - 13.0

- name: python_version
  type: string
  displayName: 'Python version label (e.g. 3.12, 3.13t)'

- name: docker_python_exe_path
  type: string
  displayName: 'Full path to the Python executable inside the Docker image'

- name: stage_name
  type: string
  displayName: 'Unique stage name for this build'

- name: wheel_artifact_name
  type: string
  displayName: 'Name for the published wheel artifact'

- name: build_intermediates_artifact_name
  type: string
  default: ''
  displayName: |
    Name for the published build intermediates artifact.
    If the name is empty, no build intermediates artifact will be published.
    The build intermediates can be used for testing.

stages:
- stage: ${{ parameters.stage_name }}
  dependsOn: []
  jobs:
  - job: ${{ parameters.stage_name }}
    timeoutInMinutes: 360
    workspace:
      clean: all
    pool:
      name: ${{ parameters.machine_pool }}
      os: linux
    templateContext:
      outputs:
      - output: pipelineArtifact
        targetPath: $(Build.ArtifactStagingDirectory)/dist
        artifactName: ${{ parameters.wheel_artifact_name }}
      - ${{ if ne(parameters.build_intermediates_artifact_name, '') }}:
        - output: pipelineArtifact
          targetPath: $(Build.ArtifactStagingDirectory)/${{ parameters.cmake_build_type }}
          artifactName: ${{ parameters.build_intermediates_artifact_name }}
    variables:
      - name: extra_build_args
        ${{ if ne(parameters.extra_build_arg, '') }}:
          value: '-x "${{ parameters.extra_build_arg }}"'
        ${{ else }}:
          value: ''
      - template: ../templates/common-variables.yml
      - name: trt_version
        ${{ if eq(parameters.cuda_version, '13.0') }}:
          value: ${{ variables.linux_trt_version_cuda13 }}
        ${{ if eq(parameters.cuda_version, '12.8') }}:
          value: ${{ variables.linux_trt_version_cuda12 }}
    steps:
      - checkout: self
        clean: true
        submodules: recursive

      - template: ../templates/set-nightly-build-option-variable-step.yml

      - template: ../templates/setup-feeds-and-python-steps.yml
        parameters:
          architecture: ${{ parameters.arch }}

      - template: ../templates/get-docker-image-steps.yml
        parameters:
          Dockerfile: tools/ci_build/github/linux/docker/inference/${{ parameters.arch }}/python/cuda/Dockerfile
          Context: tools/ci_build/github/linux/docker/inference/${{ parameters.arch }}/python/cuda
          DockerBuildArgs: "--build-arg BASEIMAGE=${{ parameters.docker_base_image }} --build-arg TRT_VERSION=${{ variables.trt_version }} --build-arg BUILD_UID=$( id -u )"
          Repository: onnxruntimecuda${{ replace(parameters.cuda_version, '.', '') }}xtrt86build${{ parameters.arch }}


      - task: Bash@3
        displayName: 'Build Python Wheel - ${{ parameters.python_version }}'
        inputs:
          targetType: filePath
          filePath: tools/ci_build/github/linux/run_python_dockerbuild.sh
          arguments: >-
            -i onnxruntimecuda${{ replace(parameters.cuda_version, '.', '') }}xtrt86build${{ parameters.arch }}
            -d "GPU"
            -c ${{ parameters.cmake_build_type }}
            -p "${{ parameters.docker_python_exe_path }}"
            $(extra_build_args)
        env:
          CUDA_VERSION: ${{ parameters.cuda_version }}

      - script: |
          set -e -x
          mv $(Build.BinariesDirectory)/dist ./dist
        workingDirectory: '$(Build.ArtifactStagingDirectory)'
        displayName: 'Move wheel files'

      - ${{ if ne(parameters.build_intermediates_artifact_name, '') }}:
        - script: |
            set -e -x
            mv $(Build.BinariesDirectory)/${{ parameters.cmake_build_type }} ./${{ parameters.cmake_build_type }}
          workingDirectory: '$(Build.ArtifactStagingDirectory)'
          displayName: 'Move build intermediates'
