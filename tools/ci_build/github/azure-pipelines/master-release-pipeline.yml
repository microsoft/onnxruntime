trigger: none

parameters:
- name: branch
  displayName: 'Target branch (without refs/heads/ prefix)'
  type: string
  default: 'main'

- name: dry_run
  displayName: 'Dry run — show what would be triggered without actually triggering'
  type: boolean
  default: false

- name: nuget_cuda12_packaging
  displayName: 'Run Zip-Nuget-Java-Nodejs Packaging Pipeline (940)'
  type: boolean
  default: true

- name: nuget_cuda13_packaging
  displayName: 'Run Nuget - Packaging - CUDA13 (2138)'
  type: boolean
  default: true

- name: python_packaging
  displayName: 'Run Python packaging pipeline (841)'
  type: boolean
  default: true

- name: python_cuda12_packaging
  displayName: 'Run Python-CUDA-Packaging-Pipeline (1299)'
  type: boolean
  default: true

- name: python_cuda13_packaging
  displayName: 'Run Python CUDA 13 Packaging Pipeline (2104)'
  type: boolean
  default: true

- name: python_dml_packaging
  displayName: 'Run Python DML Packaging Pipeline (1625)'
  type: boolean
  default: true

- name: qnn_nuget_packaging
  displayName: 'Run QNN_Nuget_Windows (1234)'
  type: boolean
  default: true

- name: dml_nuget_packaging
  displayName: 'Run DML Nuget Pipeline (1994)'
  type: boolean
  default: true

- name: npm_packaging
  displayName: 'Run Npm Packaging Pipeline (1080)'
  type: boolean
  default: true

- name: ios_packaging
  displayName: 'Run onnxruntime-ios-packaging-pipeline (995)'
  type: boolean
  default: true

- name: webgpu_python_packaging
  displayName: 'Run WebGPU Python Packaging Pipeline (2107)'
  type: boolean
  default: true

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    sdl:
      sourceAnalysisPool:
        name: onnxruntime-Win-CPU-VS2022-Latest
        os: windows
      componentgovernance:
        ignoreDirectories: '$(Build.BinariesDirectory)'
      tsa:
        enabled: true

    stages:
    - stage: TriggerSubPipelines
      displayName: 'Trigger and wait for sub-pipelines'
      jobs:
      - job: TriggerAndWait
        displayName: 'Trigger and wait for sub-pipelines'
        timeoutInMinutes: 600
        pool:
          name: 'onnxruntime-Ubuntu2404-AMD-CPU'
          os: linux

        steps:
        - checkout: self

        - task: UsePythonVersion@0
          inputs:
            versionSpec: '3.12'
          displayName: 'Use Python 3.12'

        - script: |
            pip install requests pandas azure-kusto-data[pandas]==4.5.1 azure-kusto-ingest[pandas]==4.5.1
          displayName: 'Install Python dependencies'

        - task: AzureCLI@2
          displayName: 'Run master orchestrator'
          inputs:
            azureSubscription: AISC-MAIA_DEV-CICD-KUSTO-Lotus
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              set -euo pipefail

              CMD="python tools/python/trigger_and_wait_pipelines.py"
              CMD="$CMD --branch ${{ parameters.branch }}"

              if [ "${{ parameters.dry_run }}" = "True" ]; then
                CMD="$CMD --dry-run"
              fi

              echo "Running: $CMD"
              eval $CMD
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)
