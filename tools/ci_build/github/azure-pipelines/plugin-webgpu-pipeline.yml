parameters:
- name: build_windows_x64
  displayName: 'Build Windows x64'
  type: boolean
  default: true

- name: build_windows_arm64
  displayName: 'Build Windows ARM64'
  type: boolean
  default: false

- name: build_linux_x64
  displayName: 'Build Linux x64'
  type: boolean
  default: false

- name: build_macos_arm64
  displayName: 'Build macOS ARM64'
  type: boolean
  default: false

- name: api_version
  displayName: 'API Version'
  type: number
  values:
  - 24
  - 25
  default: 24

- name: package_version
  displayName: 'Package Version'
  type: string
  values:
  - release
  - RC
  - dev
  default: dev

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    featureFlags:
      binskimScanAllExtensions: true
    sdl:
      binskim:
        enabled: true
      sourceAnalysisPool:
        name: onnxruntime-Win-CPU-VS2022-Latest
        os: windows
      componentgovernance:
        ignoreDirectories: '$(Build.Repository.LocalPath)/cmake/external/emsdk/upstream/emscripten/tests'
      spotBugs:
        enabled: false
      codeql:
        compiled:
          enabled: false
      tsa:
        enabled: true
      codeSignValidation:
        enabled: true
      policheck:
        enabled: true
        exclusionsFile: '$(Build.SourcesDirectory)\tools\ci_build\policheck_exclusions.xml'
    stages:
    # Validate parameter combinations
    - ${{ if and(eq(parameters.build_windows_arm64, true), eq(parameters.build_windows_x64, false)) }}:
      - stage: Validate_Parameters
        displayName: 'Validate Parameters'
        dependsOn: []
        jobs:
        - job: Validate
          displayName: 'Validate parameter combinations'
          pool:
            name: 'onnxruntime-Win-CPU-VS2022-Latest'
            os: windows
          steps:
          - script: |
              echo "##vso[task.logissue type=error]Windows ARM64 build requires Windows x64 build to be enabled."
              exit 1
            displayName: 'ERROR: Windows ARM64 requires Windows x64'

    # Windows x64
    - ${{ if eq(parameters.build_windows_x64, true) }}:
      - template: plugins/build.yml
        parameters:
          platform: 'win_x64'
          api_version: ${{ parameters.api_version }}
          package_version: ${{ parameters.package_version }}

    # Windows ARM64 (depends on Windows x64 build artifacts)
    - ${{ if and(eq(parameters.build_windows_arm64, true), eq(parameters.build_windows_x64, true)) }}:
      - template: plugins/build.yml
        parameters:
          platform: 'win_arm64'
          api_version: ${{ parameters.api_version }}
          package_version: ${{ parameters.package_version }}

    # Linux x64
    - ${{ if eq(parameters.build_linux_x64, true) }}:
      - template: plugins/build.yml
        parameters:
          platform: 'linux_x64'
          api_version: ${{ parameters.api_version }}
          package_version: ${{ parameters.package_version }}

    # macOS ARM64
    - ${{ if eq(parameters.build_macos_arm64, true) }}:
      - template: plugins/build.yml
        parameters:
          platform: 'macos_arm64'
          api_version: ${{ parameters.api_version }}
          package_version: ${{ parameters.package_version }}
