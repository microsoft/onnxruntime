parameters:
  AgentPool: 'Win-CPU'
  StageSuffix: ''
stages:
- stage: Nodejs_Test_${{ parameters.StageSuffix }}
  dependsOn:
  - Setup
  condition: succeeded()
  jobs:
  - job: Nodejs_Test_${{ parameters.StageSuffix }}
    workspace:
      clean: all
    timeoutInMinutes: 120
    pool:
      name: ${{ parameters.AgentPool }}
      ${{ if eq(parameters.AgentPool, 'onnxruntime-Win-CPU-VS2022-Latest') }}:
        demands:
        - ImageVersionOverride -equals 275.0.0
    variables:
    - name: OnnxRuntimeBuildDirectory
      value: '$(Build.BinariesDirectory)'
    steps:
    - template: test.yml
