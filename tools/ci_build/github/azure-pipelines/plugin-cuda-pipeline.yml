trigger: none

schedules:
- cron: '0 17 * * *'  # Daily at 17:00 UTC
  displayName: Nightly build
  branches:
    include:
    - main
  always: false  # Only run if source changed since last successful scheduled run

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

parameters:
- name: build_windows_x64
  displayName: 'Build Windows x64'
  type: boolean
  default: true

- name: build_linux_x64
  displayName: 'Build Linux x64'
  type: boolean
  default: true

- name: build_linux_aarch64
  displayName: 'Build Linux aarch64 (CUDA 13.0 only)'
  type: boolean
  default: false

- name: cuda_version
  displayName: 'CUDA Version'
  type: string
  default: '12.8'
  values:
  - '12.8'
  - '13.0'

- name: package_type
  displayName: 'Package Type'
  type: string
  values:
  - release
  - dev
  default: dev

- name: cmake_build_type
  type: string
  default: 'Release'
  values:
    - Debug
    - Release
    - RelWithDebInfo
    - MinSizeRel

variables:
  # Path (relative to the repository root) of the VERSION_NUMBER file used for plugin package versioning.
  - name: epVersionFile
    value: VERSION_NUMBER
  # Non-dev package versions (release, RC) must use Release build type
  - name: invalidBuildTypeConfig
    value: ${{ and(ne(parameters.package_type, 'dev'), ne(parameters.cmake_build_type, 'Release')) }}
  # aarch64 is only available for CUDA 13.0
  - name: invalidAArch64Config
    value: ${{ and(eq(parameters.build_linux_aarch64, true), ne(parameters.cuda_version, '13.0')) }}

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    settings:
      networkIsolationPolicy: Permissive
    sdl:
      componentgovernance:
        ignoreDirectories: '$(Build.Repository.LocalPath)/cmake/external/emsdk/upstream/emscripten/tests,$(Build.Repository.LocalPath)/cmake/external/onnx/third_party/benchmark,$(Build.Repository.LocalPath)/cmake/external/onnx/third_party/pybind11,$(Build.Repository.LocalPath)/cmake/external/onnx/third_party/pybind11/tests,$(Build.Repository.LocalPath)/cmake/external/onnxruntime-extensions,$(Build.Repository.LocalPath)/js/react_native/e2e/node_modules,$(Build.Repository.LocalPath)/js/node_modules,$(Build.Repository.LocalPath)/onnxruntime-inference-examples,$(Build.SourcesDirectory)/cmake/external/emsdk/upstream/emscripten/tests,$(Build.SourcesDirectory)/cmake/external/onnx/third_party/benchmark,$(Build.SourcesDirectory)/cmake/external/onnx/third_party/pybind11,$(Build.SourcesDirectory)/cmake/external/onnx/third_party/pybind11/tests,$(Build.SourcesDirectory)/cmake/external/onnxruntime-extensions,$(Build.SourcesDirectory)/js/react_native/e2e/node_modules,$(Build.SourcesDirectory)/js/node_modules,$(Build.SourcesDirectory)/onnxruntime-inference-examples,$(Build.BinariesDirectory)'
        alertWarningLevel: High
        failOnAlert: false
        verbosity: Normal
        timeout: 3600
      tsa:
        enabled: true
      codeSignValidation:
        enabled: true
        break: true
      policheck:
        enabled: true
        exclusionsFile: '$(Build.SourcesDirectory)\tools\ci_build\policheck_exclusions.xml'
      codeql:
        compiled:
          enabled: false
          justificationForDisabling: 'CodeQL is taking nearly 6 hours resulting in timeouts in our production pipelines'
    pool:
      name: 'onnxruntime-Win-CPU-VS2022-Latest'
      os: windows

    stages:
      # Validate parameter combinations
      - ${{ if or(eq(variables['invalidBuildTypeConfig'], 'True'), eq(variables['invalidAArch64Config'], 'True')) }}:
        - stage: Validate_Parameters
          displayName: 'Validate Parameters'
          dependsOn: []
          jobs:
          - job: Validate
            displayName: 'Validate parameter combinations'
            pool:
              name: 'onnxruntime-Win-CPU-VS2022-Latest'
              os: windows
            steps:
            - checkout: none
            - ${{ if eq(variables['invalidBuildTypeConfig'], 'True') }}:
              - script: |
                  echo "##vso[task.logissue type=error]Non-dev package version requires Release build type."
                  exit 1
                displayName: 'ERROR: Non-dev package version requires Release build type'
            - ${{ if eq(variables['invalidAArch64Config'], 'True') }}:
              - script: |
                  echo "##vso[task.logissue type=error]Linux aarch64 build is only available for CUDA 13.0."
                  exit 1
                displayName: 'ERROR: aarch64 requires CUDA 13.0'
      - ${{ else }}:
        - template: stages/plugin-cuda-packaging-stage.yml
          parameters:
            build_windows_x64: ${{ parameters.build_windows_x64 }}
            build_linux_x64: ${{ parameters.build_linux_x64 }}
            build_linux_aarch64: ${{ parameters.build_linux_aarch64 }}
            cuda_version: ${{ parameters.cuda_version }}
            package_type: ${{ parameters.package_type }}
            version_file: ${{ variables.epVersionFile }}
            cmake_build_type: ${{ parameters.cmake_build_type }}
            ${{ if eq(parameters.cuda_version, '12.8') }}:
              docker_base_image: 'onnxruntimebuildcache.azurecr.io/internal/azureml/onnxruntime/build/cuda12_x64_almalinux8_gcc14:20251017.1'
              cmake_cuda_archs: '52-real;61-real;75-real;86-real;89-real;90-virtual'
            ${{ if eq(parameters.cuda_version, '13.0') }}:
              docker_base_image: 'onnxruntimebuildcache.azurecr.io/internal/azureml/onnxruntime/build/cuda13_x64_almalinux8_gcc14:20251107.1'
              docker_base_image_aarch64: 'onnxruntimebuildcache.azurecr.io/public/azureml/onnxruntime_build_cuda13_aarch64_almalinux9_gcc14:20260323.1'
              cmake_cuda_archs: '75-real;80-real;86-real;89-real;90-real;100-real;120-real;120-virtual'
