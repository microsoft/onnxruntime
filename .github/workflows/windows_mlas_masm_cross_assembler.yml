name: MLAS x64 MASM Cross-Assembler Check

# Validates that the MLAS x64 (amd64) assembly kernels assemble under BOTH:
#   * ml64.exe  - the Microsoft Macro Assembler (native Windows toolchain), and
#   * llvm-ml   - the LLVM MASM-compatible assembler (used when cross-compiling
#                 Windows-x64 binaries from a non-Windows host, e.g. Linux).
#
# Keeping the amd64/*.asm sources buildable by both assemblers lets downstream
# consumers (such as the Edge browser) cross-compile ONNX Runtime for Windows on
# Linux build machines. This job is the authoritative guard for that property:
# a change that breaks either assembler fails here.
#
# llvm-ml is invoked with /DLLVM_ML=1. That define selects the handful of
# constructs where a single MASM spelling cannot satisfy both assemblers (today
# only the alternate-entry public label in SconvKernelAvx.asm, where ml64 needs
# the "::" global-label form and llvm-ml needs a single-colon label + PUBLIC).
# ml64.exe is invoked WITHOUT the define, so its output is completely unchanged.

on:
  push:
    branches: [main, 'rel-*']
    paths:
      - 'onnxruntime/core/mlas/lib/amd64/**'
      - '.github/workflows/windows_mlas_masm_cross_assembler.yml'
  pull_request:
    branches: [main]
    paths:
      - 'onnxruntime/core/mlas/lib/amd64/**'
      - '.github/workflows/windows_mlas_masm_cross_assembler.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mlas-masm-dual-assemble:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install LLVM (provides llvm-ml.exe)
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          if ($LASTEXITCODE -ne 0) { throw "choco install llvm failed" }

      - name: Assemble amd64/*.asm with ml64.exe and llvm-ml
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $asmDir = Join-Path $env:GITHUB_WORKSPACE 'onnxruntime/core/mlas/lib/amd64'
          if (-not (Test-Path $asmDir)) { throw "amd64 asm directory not found: $asmDir" }

          # Locate ml64.exe via vswhere (bundled on GitHub-hosted Windows images).
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio/Installer/vswhere.exe'
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found: $vswhere" }
          $ml64 = (& $vswhere -latest -products '*' -find '**/x64/ml64.exe' | Select-Object -First 1)
          if (-not $ml64) { $ml64 = (& $vswhere -latest -products '*' -find '**/ml64.exe' | Select-Object -First 1) }
          if (-not $ml64) { throw "ml64.exe not found via vswhere" }

          # Locate llvm-ml.exe from the LLVM install.
          $llvmml = (Get-Command llvm-ml.exe -ErrorAction SilentlyContinue).Source
          if (-not $llvmml) {
            $candidate = 'C:/Program Files/LLVM/bin/llvm-ml.exe'
            if (Test-Path $candidate) { $llvmml = $candidate }
          }
          if (-not $llvmml) { throw "llvm-ml.exe not found" }

          Write-Host "ml64.exe  : $ml64"
          Write-Host "llvm-ml   : $llvmml"
          & $ml64 2>&1 | Select-Object -First 1 | Write-Host
          & $llvmml --version 2>&1 | Select-Object -First 3 | Write-Host

          $outDir = Join-Path $env:RUNNER_TEMP 'mlas_asm_out'
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $asmFiles = Get-ChildItem -Path $asmDir -Filter '*.asm' | Sort-Object Name
          if ($asmFiles.Count -eq 0) { throw "no .asm files found in $asmDir" }
          Write-Host "Found $($asmFiles.Count) amd64 .asm files."

          $ml64Failures = @()
          $llvmFailures = @()

          foreach ($f in $asmFiles) {
            $name = $f.BaseName

            # --- ml64.exe (native MASM; no LLVM_ML define) ---
            $ml64Obj = Join-Path $outDir "$name.ml64.obj"
            $ml64Log = & $ml64 /nologo /c /Fo"$ml64Obj" /I"$asmDir" $f.FullName 2>&1
            if ($LASTEXITCODE -ne 0) {
              $ml64Failures += $f.Name
              Write-Host "::error::ml64 failed to assemble $($f.Name)"
              $ml64Log | ForEach-Object { Write-Host "    $_" }
            }

            # --- llvm-ml (cross-assembler; LLVM_ML define selects dual-safe spellings) ---
            $llvmObj = Join-Path $outDir "$name.llvm.obj"
            $llvmLog = & $llvmml -m64 /c /DLLVM_ML=1 /Fo"$llvmObj" /I"$asmDir" $f.FullName 2>&1
            if ($LASTEXITCODE -ne 0) {
              $llvmFailures += $f.Name
              Write-Host "::error::llvm-ml failed to assemble $($f.Name)"
              $llvmLog | ForEach-Object { Write-Host "    $_" }
            }
          }

          Write-Host ""
          Write-Host "===================== Summary ====================="
          Write-Host ("Total files      : {0}" -f $asmFiles.Count)
          Write-Host ("ml64 failures    : {0}" -f $ml64Failures.Count)
          Write-Host ("llvm-ml failures : {0}" -f $llvmFailures.Count)

          if ($ml64Failures.Count -gt 0) {
            Write-Host "ml64 could not assemble:"
            $ml64Failures | ForEach-Object { Write-Host "  - $_" }
          }
          if ($llvmFailures.Count -gt 0) {
            Write-Host "llvm-ml could not assemble (breaks Windows-on-Linux cross-compile):"
            $llvmFailures | ForEach-Object { Write-Host "  - $_" }
          }

          if ($ml64Failures.Count -gt 0 -or $llvmFailures.Count -gt 0) {
            throw "One or more amd64 .asm files failed to assemble under ml64 and/or llvm-ml."
          }

          Write-Host "All $($asmFiles.Count) amd64 .asm files assembled successfully under both ml64 and llvm-ml."
