name: windows_x64_release_xnnpack

on:
  push:
    branches: [main, 'rel-*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

jobs:
  build_x64_release_xnnpack:
    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-github-vs2022-latest",
      "JobId=build_x64_release_xnnpack-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
      ]
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: x64

      - name: Locate vcvarsall and Setup Env
        uses: ./.github/actions/locate-vcvarsall-and-setup-env
        with:
          architecture: x64
          cache_key: windows_x64_release_xnnpack.yml | build_x64_release_xnnpack

      - name: Install python modules
        shell: cmd
        run: python -m pip install -r "${{ github.workspace }}\tools\ci_build\github\windows\python\requirements.txt"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          architecture: x64

      - name: API Documentation Check and generate
        shell: cmd
        run: |
          set ORT_DOXY_SRC=${{ github.workspace }}
          set ORT_DOXY_OUT=${{ github.workspace }}\build\RelWithDebInfo\RelWithDebInfo
          mkdir %ORT_DOXY_SRC%
          mkdir %ORT_DOXY_OUT%
          "C:\Program Files\doxygen\bin\doxygen.exe" ${{ github.workspace }}\tools\ci_build\github\Doxyfile_csharp.cfg
        working-directory: ${{ github.workspace }}

      - name: Use .NET 8.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'
        env:
          PROCESSOR_ARCHITECTURE: x64

      - name: Use Nuget 6.x
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: NuGet restore
        shell: cmd
        run: |
          nuget restore ${{ github.workspace }}\packages.config -PackagesDirectory ${{ github.workspace }}\build\RelWithDebInfo -ConfigFile ${{ github.workspace }}\NuGet.config

      - name: Build and Test
        shell: pwsh
        run: |
          python.exe "${env:GITHUB_WORKSPACE}\tools\ci_build\build.py" `
            --build_csharp `
            --build_dir "${env:GITHUB_WORKSPACE}\build" `
            --build_nuget `
            --build_shared_lib `
            --cmake_generator "Visual Studio 17 2022" `
            --config RelWithDebInfo `
            --disable_rtti `
            --enable_onnx_tests `
            --msbuild_extra_options "IncludeMobileTargets=false" `
            --parallel `
            --skip_submodule_sync `
            --use_binskim_compliant_compile_flags `
            --use_ccache `
            --use_vcpkg `
            --use_vcpkg_ms_internal_asset_cache `
            --use_xnnpack
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          Remove-Item "${env:GITHUB_WORKSPACE}\build\RelWithDebInfo" -Include "*.obj" -Recurse
        env:
          ALLOW_RELEASED_ONNX_OPSET_ONLY: '0'
          DocUpdateNeeded: 'false'

      - name: Validate C# native delegates
        shell: cmd
        run: python tools\ValidateNativeDelegateAttributes.py
        working-directory: ${{ github.workspace }}\\csharp

      - name: Publish OperatorKernels.md (Conditional)
        uses: actions/upload-artifact@v6
        if: failure() && env.DocUpdateNeeded == 'true'
        with:
          name: OperatorKernels.md
          path: ${{ github.workspace }}/docs/OperatorKernels.md

      - name: Publish ContribOperators.md (Conditional)
        uses: actions/upload-artifact@v6
        if: failure() && env.DocUpdateNeeded == 'true'
        with:
          name: ContribOperators.md
          path: ${{ github.workspace }}/docs/ContribOperators.md

    env:
      OrtPackageId: Microsoft.ML.OnnxRuntime
      OnnxRuntimeBuildDirectory: ${{ github.workspace }}\build
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
