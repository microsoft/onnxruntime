name: Linux CPU Minimal Build E2E

on:
  push:
    branches:
      - main
      - rel-*
      - snnn/ci
  pull_request:
    branches:
      - main
      - rel-*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Map ADO Build.SourcesDirectory
  BUILD_SOURCES_DIRECTORY: ${{ github.workspace }}

jobs:
  # Job 1: Build full onnxruntime and generate ORT format test files
  build_full_ort:
    name: 1. Build Full ORT and Generate ORT Files
    runs-on: ["self-hosted", "1ES.Pool=onnxruntime-github-Ubuntu2204-AMD-CPU"]
    permissions: # Permissions needed for build-docker-image
      contents: read
      packages: write
      id-token: write # If using OIDC for ACR login
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get Docker Image using Action
        uses: microsoft/onnxruntime-github-actions/build-docker-image@v0.0.5
        id: build_docker_image_step
        with:
          dockerfile: ${{ github.workspace }}/tools/ci_build/github/linux/docker/inference/x86_64/default/cpu/Dockerfile
          image-name: ghcr.io/microsoft/onnxruntime/onnxruntimecpubuildcix64
          push: true
          azure-container-registry-name: onnxruntimebuildcache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run Build 1 (Using custom script)
        shell: bash
        run: |
          # Create the host directory where test data will be placed by the container script
          mkdir -p ${{ runner.temp }}/.test_data
          # Create build output directory (e.g., /build/1)
          mkdir -p ${{ runner.temp }}/1

          docker run --rm \
            --volume ${{ env.BUILD_SOURCES_DIRECTORY }}:/onnxruntime_src \
            --volume ${{ runner.temp }}:/build \
            -e ACTIONS_CACHE_URL \
            -e ACTIONS_RUNTIME_TOKEN \
            -e ALLOW_RELEASED_ONNX_OPSET_ONLY=1 \
            -e NIGHTLY_BUILD=1 \
            -e BUILD_BUILDNUMBER=${{ github.run_id }} \
            ${{ steps.build_docker_image_step.outputs.full-image-name }} \
            /bin/bash -c " \
              set -e -x; \
              mkdir -p /home/onnxruntimedev; \
              ln -sf /build/.test_data /home/onnxruntimedev/.test_data; \
              # Script generates build artifacts in /build/1 and test data in /home/onnxruntimedev/.test_data (linked to /build/.test_data)
              /onnxruntime_src/tools/ci_build/github/linux/ort_minimal/build_full_ort_and_create_ort_files.sh /build/1; \
            "
        working-directory: ${{ env.BUILD_SOURCES_DIRECTORY }}

      - name: Upload Test Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test_data
          path: ${{ runner.temp }}/.test_data/
          if-no-files-found: error # Fail if test data wasn't generated

  # Job 2: Build minimal onnxruntime [exceptions DISABLED, type reduction DISABLED, training ops ENABLED]
  build_minimal_exceptions_disabled:
    name: 2. Build Minimal (Exceptions Disabled)
    needs: build_full_ort # Depends on Job 1 for test data
    runs-on: ["self-hosted", "1ES.Pool=onnxruntime-github-Ubuntu2204-AMD-CPU"]
    permissions: # Permissions needed for build-docker-image
      contents: read
      packages: write
      id-token: write # If using OIDC for ACR login
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download Test Data Artifact
        uses: actions/download-artifact@v4
        with:
          name: test_data
          path: ${{ runner.temp }}/.test_data/

      - name: Get Docker Image using Action
        uses: microsoft/onnxruntime-github-actions/build-docker-image@v0.0.5
        id: build_docker_image_step
        with:
          dockerfile: ${{ github.workspace }}/tools/ci_build/github/linux/docker/inference/x86_64/default/cpu/Dockerfile
          image-name: ghcr.io/microsoft/onnxruntime/onnxruntimecpubuildcix64
          push: true
          azure-container-registry-name: onnxruntimebuildcache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run Build 2 (Update)
        uses: microsoft/onnxruntime-github-actions/run-build-script-in-docker@v0.0.5
        with:
          docker_image: ${{ steps.build_docker_image_step.outputs.full-image-name }}
          build_config: Debug # From original --config Debug
          mode: 'update' # CMake configure step
          extra_build_flags: >-
            --cmake_generator Ninja
            --use_binskim_compliant_compile_flags
            --skip_tests
            --minimal_build
            --disable_exceptions
            --enable_training_ops

      - name: Run Build 2 (Build)
        uses: microsoft/onnxruntime-github-actions/run-build-script-in-docker@v0.0.5
        with:
          docker_image: ${{ steps.build_docker_image_step.outputs.full-image-name }}
          build_config: Debug # From original --config Debug
          mode: 'build' # Actual build step
          extra_build_flags: >-
            --cmake_generator Ninja
            --use_binskim_compliant_compile_flags
            --skip_tests
            --minimal_build
            --disable_exceptions
            --enable_training_ops

  # Job 3a: Build minimal onnxruntime [exceptions ENABLED, type reduction DISABLED, custom ops ENABLED] and run tests
  build_minimal_custom_ops:
    name: 3a. Build Minimal (Custom Ops)
    needs: build_full_ort # Depends on Job 1 for test data
    runs-on: ["self-hosted", "1ES.Pool=onnxruntime-github-Ubuntu2204-AMD-CPU"]
    permissions: # Permissions needed for build-docker-image
      contents: read
      packages: write
      id-token: write # If using OIDC for ACR login
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download Test Data Artifact
        uses: actions/download-artifact@v4
        with:
          name: test_data
          path: ${{ runner.temp }}/.test_data/

      - name: Get Docker Image using Action
        uses: microsoft/onnxruntime-github-actions/build-docker-image@v0.0.5
        id: build_docker_image_step
        with:
          dockerfile: ${{ github.workspace }}/tools/ci_build/github/linux/docker/inference/x86_64/default/cpu/Dockerfile
          image-name: ghcr.io/microsoft/onnxruntime/onnxruntimecpubuildcix64
          push: true
          azure-container-registry-name: onnxruntimebuildcache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run Build 3a (Using custom script)
        shell: bash
        run: |
          # Create the target dir for build output inside the runner's temp dir first
          mkdir -p ${{ runner.temp }}/3a
          docker run --rm \
            --volume ${{ env.BUILD_SOURCES_DIRECTORY }}:/onnxruntime_src \
            --volume ${{ runner.temp }}:/build \
            -e ALLOW_RELEASED_ONNX_OPSET_ONLY=1 \
            -e NIGHTLY_BUILD=1 \
            -e BUILD_BUILDNUMBER=${{ github.run_id }} \
            ${{ steps.build_docker_image_step.outputs.full-image-name }} \
            /bin/bash /onnxruntime_src/tools/ci_build/github/linux/ort_minimal/build_minimal_ort_and_run_tests.sh \
              --build-directory /build/3a \
              --reduced-ops-config /build/.test_data/required_ops.ort_models.config \
              --enable-custom-ops
        working-directory: ${{ env.BUILD_SOURCES_DIRECTORY }}

  # Job 3b: Build minimal onnxruntime [exceptions ENABLED, type reduction ENABLED] and run tests
  build_minimal_type_reduction:
    name: 3b. Build Minimal (Type Reduction)
    needs: build_full_ort # Depends on Job 1 for test data
    runs-on: ["self-hosted", "1ES.Pool=onnxruntime-github-Ubuntu2204-AMD-CPU"]
    permissions: # Permissions needed for build-docker-image
      contents: read
      packages: write
      id-token: write # If using OIDC for ACR login
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download Test Data Artifact
        uses: actions/download-artifact@v4
        with:
          name: test_data
          path: ${{ runner.temp }}/.test_data/

      - name: Get Docker Image using Action
        uses: microsoft/onnxruntime-github-actions/build-docker-image@v0.0.5
        id: build_docker_image_step
        with:
          dockerfile: ${{ github.workspace }}/tools/ci_build/github/linux/docker/inference/x86_64/default/cpu/Dockerfile
          image-name: ghcr.io/microsoft/onnxruntime/onnxruntimecpubuildcix64
          push: true
          azure-container-registry-name: onnxruntimebuildcache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run Build 3b (Using custom script)
        shell: bash
        run: |
          # Create the target dir for build output inside the runner's temp dir first
          mkdir -p ${{ runner.temp }}/3b
          docker run --rm \
            --volume ${{ env.BUILD_SOURCES_DIRECTORY }}:/onnxruntime_src \
            --volume ${{ runner.temp }}:/build \
            -e ALLOW_RELEASED_ONNX_OPSET_ONLY=1 \
            -e NIGHTLY_BUILD=1 \
            -e BUILD_BUILDNUMBER=${{ github.run_id }} \
            ${{ steps.build_docker_image_step.outputs.full-image-name }} \
            /bin/bash /onnxruntime_src/tools/ci_build/github/linux/ort_minimal/build_minimal_ort_and_run_tests.sh \
              --build-directory /build/3b \
              --reduced-ops-config /build/.test_data/required_ops_and_types.ort_models.config \
              --enable-type-reduction
        working-directory: ${{ env.BUILD_SOURCES_DIRECTORY }}

  # Job 4: Build minimal onnxruntime [exceptions ENABLED, type reduction ENABLED (globally allowed types)] and run tests
  build_minimal_globally_allowed_types:
    name: 4. Build Minimal (Globally Allowed Types)
    needs: build_full_ort # Depends on Job 1 for test data
    runs-on: ["self-hosted", "1ES.Pool=onnxruntime-github-Ubuntu2204-AMD-CPU"]
    permissions: # Permissions needed for build-docker-image
      contents: read
      packages: write
      id-token: write # If using OIDC for ACR login
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download Test Data Artifact
        uses: actions/download-artifact@v4
        with:
          name: test_data
          path: ${{ runner.temp }}/.test_data/

      - name: Get Docker Image using Action
        uses: microsoft/onnxruntime-github-actions/build-docker-image@v0.0.5
        id: build_docker_image_step
        with:
          dockerfile: ${{ github.workspace }}/tools/ci_build/github/linux/docker/inference/x86_64/default/cpu/Dockerfile
          image-name: ghcr.io/microsoft/onnxruntime/onnxruntimecpubuildcix64
          push: true
          azure-container-registry-name: onnxruntimebuildcache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run Build 4 (Using custom script)
        shell: bash
        run: |
          # Create the target dir for build output inside the runner's temp dir first
          mkdir -p ${{ runner.temp }}/4
          docker run --rm \
            --volume ${{ env.BUILD_SOURCES_DIRECTORY }}:/onnxruntime_src \
            --volume ${{ runner.temp }}:/build \
            -e ALLOW_RELEASED_ONNX_OPSET_ONLY=1 \
            -e NIGHTLY_BUILD=1 \
            -e BUILD_BUILDNUMBER=${{ github.run_id }} \
            ${{ steps.build_docker_image_step.outputs.full-image-name }} \
            /bin/bash -c " \
              printf \"%s\\n%s\\n\" \
                \"!globally_allowed_types;bool,float,int8_t,uint8_t\" \
                \"!no_ops_specified_means_all_ops_are_required\" \
                > /build/.test_data/globally_allowed_types.config && \
              /onnxruntime_src/tools/ci_build/github/linux/ort_minimal/build_minimal_ort_and_run_tests.sh \
                --build-directory /build/4 \
                --reduced-ops-config /build/.test_data/globally_allowed_types.config \
                --enable-type-reduction \
                --skip-model-tests \
            "
        working-directory: ${{ env.BUILD_SOURCES_DIRECTORY }}

  # Job 5: Build extended minimal onnxruntime and run tests
  build_extended_minimal:
    name: 5. Build Extended Minimal
    needs: build_full_ort # Depends on Job 1 for test data
    runs-on: ["self-hosted", "1ES.Pool=onnxruntime-github-Ubuntu2204-AMD-CPU"]
    permissions: # Permissions needed for build-docker-image
      contents: read
      packages: write
      id-token: write # If using OIDC for ACR login
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download Test Data Artifact
        uses: actions/download-artifact@v4
        with:
          name: test_data
          path: ${{ runner.temp }}/.test_data/

      - name: Get Docker Image using Action
        uses: microsoft/onnxruntime-github-actions/build-docker-image@v0.0.5
        id: build_docker_image_step
        with:
          dockerfile: ${{ github.workspace }}/tools/ci_build/github/linux/docker/inference/x86_64/default/cpu/Dockerfile
          image-name: ghcr.io/microsoft/onnxruntime/onnxruntimecpubuildcix64
          push: true
          azure-container-registry-name: onnxruntimebuildcache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run Build 5 (Update)
        uses: microsoft/onnxruntime-github-actions/run-build-script-in-docker@v0.0.5
        with:
          docker_image: ${{ steps.build_docker_image_step.outputs.full-image-name }}
          build_config: Debug # From original --config Debug
          mode: 'update'
          extra_build_flags: >-
            --cmake_generator Ninja
            --build_shared_lib
            --use_binskim_compliant_compile_flags
            --minimal_build extended

      - name: Run Build 5 (Build)
        uses: microsoft/onnxruntime-github-actions/run-build-script-in-docker@v0.0.5
        with:
          docker_image: ${{ steps.build_docker_image_step.outputs.full-image-name }}
          build_config: Debug # From original --config Debug
          mode: 'build'
          extra_build_flags: >-
            --cmake_generator Ninja
            --build_shared_lib
            --use_binskim_compliant_compile_flags
            --minimal_build extended
            # Assuming tests should be run if --skip_tests is not specified


  # Job 6a: Regular build with python and all optional features disabled.
  build_regular_no_optional:
    name: 6a. Build Regular (No Optional Features)
    needs: build_full_ort # Depends on Job 1 for test data
    runs-on: ["self-hosted", "1ES.Pool=onnxruntime-github-Ubuntu2204-AMD-CPU"]
    permissions: # Permissions needed for build-docker-image
      contents: read
      packages: write
      id-token: write # If using OIDC for ACR login
    steps:
