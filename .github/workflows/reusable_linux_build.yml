name: Reusable Linux CPU/GPU Build and Test

on:
  workflow_call:
    inputs:
      pool_name:
        description: 'The specific 1ES pool name (e.g., onnxruntime-github-Ubuntu2204-AMD-CPU)'
        required: true
        type: string
      build_config:
        description: 'Build configuration (Debug or Release)'
        required: true
        type: string
      architecture:
        description: 'Target architecture (x64 or arm64)'
        required: true
        type: string
      dockerfile_path:
        description: 'Path to the Dockerfile relative to the workspace root'
        required: true
        type: string
      docker_image_repo:
        description: 'Name for the Docker image repository'
        required: true
        type: string
      docker_build_args:
        description: 'Arguments to pass to the docker image build command'
        required: false
        type: string
        default: ''
      execution_providers:
        description: 'Space-separated list of execution providers to enable (passed to build.py)'
        required: false
        type: string
        default: ''
      extra_build_flags:
        description: 'Additional flags for the build.py script (appended after EP flags)'
        required: false
        type: string
        default: ''
      python_path_prefix:
        description: 'Optional prefix to add to the PATH for python command (e.g., PATH=/opt/python/cp310-cp310/bin:$PATH)'
        required: false
        type: string
        default: ''
      python_version:
        description: 'Python version to set up on the runner host'
        required: false
        type: string
        default: '3.x'
      run_tests:
        description: 'Whether to execute the test suite after building'
        required: false
        type: boolean
        default: true
      upload_build_output:
        description: 'Whether to upload the build output directory as an artifact (used when tests are skipped)'
        required: false
        type: boolean
        default: false
      job_identifier:
        description: 'A unique identifier for the job, used for hosted pool tracking'
        required: true
        type: string
    secrets:
      GH_TOKEN:
        description: 'GitHub token for accessing actions/packages'
        required: true

jobs:
  build_test_pipeline:
    runs-on:
      - self-hosted
      - "1ES.Pool=${{ inputs.pool_name }}"
      - "JobId=${{ inputs.job_identifier }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Runtime context
        shell: bash
        run: |
          set +e
  
          echo "=== RUNTIME CONTEXT ==="
          whoami || true
          hostname || true
          uname -a || true
  
          echo ""
          echo "=== AWS / OIDC ENV HINTS ==="
          env | grep -E '^AWS_|^ACTIONS_ID_TOKEN' \
            | sed -E 's/(TOKEN|SECRET|KEY|CREDENTIAL|PASSWORD).*/<redacted>/g' \
            || true
  
          echo ""
          echo "=== TOOLING ==="
          which aws || echo "no aws"
          aws --version || true
          command -v az || true
          command -v docker || true
          command -v kubectl || true
          command -v git || true
          command -v jq || true
          command -v python3 || true
          command -v curl || true
          echo "Running 'az account show' without login; expected to fail unless the agent/context has credentials."
          az account show --only-show-errors || true
          echo "going to check access token"
          az account get-access-token \
            --resource https://management.azure.com \
            --query "{expiresOn:expiresOn, expires_on:expires_on, subscription:subscription, tenant:tenant, tokenType:tokenType}" \
            -o json || true
