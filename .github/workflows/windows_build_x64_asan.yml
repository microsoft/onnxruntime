# .github/workflows/build_x64_asan.yml
name: windows_x64_asan

on:
  push:
    branches: [main, 'rel-*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

jobs:
  build_x64:
    runs-on: [
        "self-hosted",
        "1ES.Pool=onnxruntime-github-vs2022-mms",
        "JobId=windows-build-x64-asan-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
        ]
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: x64

      - name: Locate vcvarsall and Setup Env
        uses: ./.github/actions/locate-vcvarsall-and-setup-env # Use the composite action
        with:
          architecture: x64
          cache_key: windows_build_x64_asan.yml | build_x64

      - name: Build and Test (Combined)
        shell: pwsh
        run: |
          echo ${env:PATH}
          python -m pip install -r "${env:GITHUB_WORKSPACE}\tools\ci_build\github\windows\python\requirements.txt"
          python "${env:GITHUB_WORKSPACE}\tools\ci_build\build.py" `
            --build_dir "${env:RUNNER_TEMP}\build" `
            --cmake_generator "Visual Studio 17 2022" `
            --config Debug `
            --disable_memleak_checker `
            --enable_address_sanitizer `
            --parallel `
            --skip_submodule_sync `
            --use_cache `
            --use_vcpkg `
            --use_vcpkg_ms_internal_asset_cache
