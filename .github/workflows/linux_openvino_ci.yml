name: Linux OpenVINO CI

on:
  push:
    branches: [main, 'rel-*']
  workflow_dispatch:
  workflow_call: # Allows this workflow to be invoked as the Stage 2 "openvino provider" gate by ci_orchestrator.yml
  # NOTE: standalone `pull_request:` trigger removed - ci_orchestrator.yml is now the sole PR entry point.

# NOTE: no standalone `concurrency:` block here - this workflow's own group would be
# `${{ github.workflow }}-<ref>`, but github.workflow resolves to the *caller's* name
# ("CI Orchestrator") when invoked via workflow_call, which is identical to the
# orchestrator's own top-level group and causes GitHub to detect a deadlock and cancel
# this job outright. ci_orchestrator.yml's top-level `concurrency:` already covers
# cancel-in-progress for the whole PR run; standalone push/workflow_dispatch triggers
# here are keyed off github.sha, which is always unique, so no dedicated group is needed.

permissions:
  contents: read
  packages: write # Needed if the reusable workflow pushes images
  attestations: write # Optional: for artifact attestations if enabled
  id-token: write # Optional: may be needed for OIDC authentication (e.g., ACR)

jobs:
  build_test_openvino:
    name: Build and Test OpenVINO EP (AlamLinux8, Py3.12)
    # Use the reusable workflow as the other Linux CI pipelines
    uses: ./.github/workflows/reusable_linux_build.yml
    with:
      pool_name: "onnxruntime-github-Ubuntu2204-AMD-CPU"
      build_config: Release
      # Architecture: OpenVino only supports Intel X64
      architecture: x64
      dockerfile_path: tools/ci_build/github/linux/docker/inference/x86_64/python/openvino/Dockerfile
      docker_image_repo: onnxruntimeopenvino

      execution_providers: 'openvino'

      extra_build_flags: '--use_openvino CPU --enable_generic_interface --build_shared_lib'

      # Python Path Prefix: Set the correct Python 3.12 path inside the manylinux container
      python_path_prefix: 'PATH=/opt/python/cp312-cp312/bin:$PATH'

      run_tests: true
      upload_build_output: false
      job_identifier: build_test_openvino

    # Secrets: Pass the necessary GitHub token
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
