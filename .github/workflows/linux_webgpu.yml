name: Linux WebGPU CI

on:
  push:
    branches: [main, 'rel-*']
  workflow_dispatch:
  workflow_call: # Allows this workflow to be invoked as the Stage 2 "webgpu provider" gate by ci_orchestrator.yml
  # NOTE: standalone `pull_request:` trigger removed - ci_orchestrator.yml is now the sole PR entry point.

# NOTE: no standalone `concurrency:` block here - this workflow's own group would be
# `${{ github.workflow }}-<ref>`, but github.workflow resolves to the *caller's* name
# ("CI Orchestrator") when invoked via workflow_call, which is identical to the
# orchestrator's own top-level group and causes GitHub to detect a deadlock and cancel
# this job outright. ci_orchestrator.yml's top-level `concurrency:` already covers
# cancel-in-progress for the whole PR run; standalone push/workflow_dispatch triggers
# here are keyed off github.sha, which is always unique, so no dedicated group is needed.

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-linux-webgpu-x64-release:
    name: Build Linux WebGPU x64 Release
    # This job runs on a CPU node using the reusable build workflow
    uses: ./.github/workflows/reusable_linux_build.yml
    with:
      pool_name: "onnxruntime-github-Ubuntu2204-AMD-CPU" # Build pool
      build_config: Release
      architecture: x64
      dockerfile_path: tools/ci_build/github/linux/docker/Dockerfile.manylinux2_28_webgpu
      docker_image_repo: onnxruntimecpubuildpythonx64
      extra_build_flags: '--use_binskim_compliant_compile_flags --build_wheel --use_webgpu --build_java --cmake_extra_defines onnxruntime_BUILD_UNIT_TESTS=ON'
      python_path_prefix: 'PATH=/opt/python/cp310-cp310/bin:$PATH'
      run_tests: false
      upload_build_output: true
      execution_providers: 'webgpu'
      job_identifier: build-linux-webgpu-x64-release
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Pass token for reusable workflow needs (e.g., docker build action)

