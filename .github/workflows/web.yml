name: Web CI Pipeline

on:
  push:
    branches:
      - main
      - rel-*
  workflow_dispatch:
  workflow_call: # Allows this workflow to be invoked as the Stage 2 "js/webnn provider" gate by ci_orchestrator.yml
  # NOTE: standalone `pull_request:` trigger removed - ci_orchestrator.yml is now the sole PR entry point.

# NOTE: no standalone `concurrency:` block here - this workflow's own group would be
# `${{ github.workflow }}-<ref>`, but github.workflow resolves to the *caller's* name
# ("CI Orchestrator") when invoked via workflow_call, which is identical to the
# orchestrator's own top-level group and causes GitHub to detect a deadlock and cancel
# this job outright. ci_orchestrator.yml's top-level `concurrency:` already covers
# cancel-in-progress for the whole PR run; standalone push/workflow_dispatch triggers
# here are keyed off github.sha, which is always unique, so no dedicated group is needed.

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.extract_commit.outputs.commit_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Init and Precheck
        uses: ./.github/actions/linux-web-init-and-check

      - name: Extract commit SHA
        id: extract_commit
        run: echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
        shell: bash

  wasm_Debug:
    needs: precheck
    uses: ./.github/workflows/linux-wasm-ci-build-and-test-workflow.yml
    with:
      job_name: wasm_Debug
      build_config: Debug
      extra_build_args: "--enable_wasm_profiling"
      build_jsep: true
      build_webgpu: true

  wasm_Release:
    needs: precheck
    uses: ./.github/workflows/linux-wasm-ci-build-and-test-workflow.yml
    with:
      job_name: wasm_Release
      build_config: Release
      extra_build_args: "--target onnxruntime_webassembly --skip_tests --disable_rtti"
      build_jsep: true
      build_webgpu: true

  wasm_Release_static_library:
    needs: precheck
    uses: ./.github/workflows/linux-wasm-ci-build-and-test-workflow.yml
    with:
      job_name: wasm_Release_static_library
      build_config: Release
      extra_build_args: "--skip_tests --disable_rtti --build_wasm_static_lib"
      use_vcpkg: false
      enable_wasm_threads: false
      skip_publish: true

  web_Debug:
    needs:
      - precheck
      - wasm_Debug
    uses: ./.github/workflows/windows-web-ci-workflow.yml
    with:
      job_name: web_Debug
      commit_override: ${{ needs.precheck.outputs.commit_sha }}
      build_config: Debug

  web_Release:
    needs:
      - precheck
      - wasm_Release
    uses: ./.github/workflows/windows-web-ci-workflow.yml
    with:
      job_name: web_Release
      commit_override: ${{ needs.precheck.outputs.commit_sha }}
      build_config: Release
